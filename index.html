* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }

.app { display: flex; height: 100vh; }
#map { flex: 1; min-width: 0; }

.panel {

}

.panel-header {
  position: sticky; top: 0; z-index: 10; background: linear-gradient(135deg, #1a73e8, #0d47a1);
  color: white; padding: 16px 20px;
}
.panel-header h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.panel-header p { font-size: 12px; opacity: .85; }

.plan-tabs {
  display: flex; position: sticky; top: 72px; z-index: 10; background: #fff;
  border-bottom: 2px solid #e0e0e0;
}
.plan-tab {
  flex: 1; padding: 12px 8px; text-align: center; cursor: pointer;
  font-size: 13px; font-weight: 600; color: #666; border-bottom: 3px solid transparent;
  transition: all .2s;
}
.plan-tab:hover { background: #f5f8ff; }
.plan-tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }

.summary-bar {
  padding: 12px 20px; background: #f8f9fa; border-bottom: 1px solid #e0e0e0;
  display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: #555;
}
.summary-item { display: flex; align-items: center; gap: 4px; }
.summary-item strong { color: #333; }

.day-card {
  padding: 14px 20px; border-bottom: 1px solid #f0f0f0;
  transition: background .15s;
}
.day-card:hover { background: #f8faff; }
.day-card.skipped { opacity: .45; }
.day-card.skipped .day-body { display: none; }

.day-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer;
}
.day-icon { font-size: 20px; }
.day-title { font-size: 14px; font-weight: 600; color: #222; flex: 1; }
.day-date { font-size: 11px; color: #888; }

.tag {
  display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px;
  font-weight: 600; text-transform: uppercase; letter-spacing: .3px;
}
.tag-camp { background: #e8f5e9; color: #2e7d32; }
.tag-hotel { background: #e3f2fd; color: #1565c0; }
.tag-sight { background: #fff3e0; color: #e65100; }
.tag-drive { background: #f3e5f5; color: #7b1fa2; }

.day-desc { font-size: 12px; color: #555; line-height: 1.5; margin: 6px 0; }

.drive-info {
  display: flex; align-items: center; gap: 6px; font-size: 11px; color: #7b1fa2;
  margin: 4px 0 8px; padding: 4px 8px; background: #faf5ff; border-radius: 6px;
  border: 1px solid #e8d5f5;
}

.avail-grid {
  display: flex; gap: 3px; flex-wrap: wrap; margin: 8px 0;
}
.avail-cell {
  width: 42px; height: 36px; border-radius: 6px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; font-size: 9px; font-weight: 600;
  cursor: default; border: 1px solid transparent;
}
.avail-cell .avail-date { font-size: 8px; opacity: .7; }
.avail-cell .avail-count { font-size: 12px; font-weight: 700; }
.avail-good { background: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
.avail-low { background: #fff8e1; color: #f57f17; border-color: #fff0b3; }
.avail-none { background: #ffebee; color: #c62828; border-color: #ffcdd2; }
.avail-unknown { background: #f5f5f5; color: #999; border-color: #e0e0e0; }
.avail-cell.selected { border: 2px solid #1a73e8; box-shadow: 0 0 0 1px #1a73e8; }

.site-detail-title { font-weight: 700; color: #333; margin-bottom: 4px; }

.site-chip {

.night-btn {

.night-val {

.skip-btn {

.photo-strip {

.photo-strip::-webkit-scrollbar { height: 4px; }
.photo-strip::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
.photo-thumb {

.photo-thumb:hover { border-color: #1a73e8; transform: scale(1.05); }

.lightbox {

.lightbox.open { display: flex; }
.lightbox-img {

}
.lightbox-caption {

.lightbox-close {

.lightbox-close:hover { opacity: 1; }
.lightbox-nav {

.activity-toggle:hover { background: #bbdefb; }

.activity-item::before {

.footer {
  padding: 16px 20px; background: #f8f9fa; border-top: 1px solid #e0e0e0;
  font-size: 11px; color: #888; line-height: 1.5;

.mobile-toggle {

  width: 50px; height: 50px; border-radius: 50%; border: none;
  background: #1a73e8; color: white; font-size: 22px; cursor: pointer;

  .app { flex-direction: column-reverse; }
  .panel { width: 100%; height: 55vh; }

// Find sites available across consecutive nights (for multi-night continuity)
function findContinuousSites(campKey, startDateStr, nights) {
  const detail = siteDetail[campKey];
  if (!detail || nights < 2) return null;
  const dates = [];
  const [m,d] = startDateStr.split('-').map(Number);
  for (let i = 0; i < nights; i++) {
    const dt = new Date(2026, m-1, d+i);
    dates.push(String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'));
  }
  // Find sites present in ALL dates
  const allSiteSets = dates.map(dk => new Set(detail.sites[dk] || []));
  if (allSiteSets.some(s => s.size === 0)) return { dates, common: [], partial: [] };
  const common = [...allSiteSets[0]].filter(s => allSiteSets.every(set => set.has(s)));
  return { dates, common };
}

// Toggle activity panel
function toggleActivity(stopId) {
  const btn = document.getElementById('act-toggle-' + stopId);
  const panel = document.getElementById('act-panel-' + stopId);
  if (!btn || !panel) return;
  btn.classList.toggle('open');
  panel.classList.toggle('open');
}

// Lightbox state
let lbPhotos = [];
let lbIndex = 0;

function openLightbox(stopId, idx) {
  lbPhotos = photos[stopId] || [];
  lbIndex = idx || 0;
  if (!lbPhotos.length) return;
  showLbPhoto();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target !== e.currentTarget && !e.target.classList.contains('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function navLightbox(dir, e) {
  if (e) e.stopPropagation();
  lbIndex = (lbIndex + dir + lbPhotos.length) % lbPhotos.length;
  showLbPhoto();
}

function showLbPhoto() {
  const p = lbPhotos[lbIndex];
  document.getElementById('lightboxImg').src = p.url;
  document.getElementById('lightboxCaption').textContent = `${p.cap}  (${lbIndex+1}/${lbPhotos.length})`;
}

// Keyboard nav for lightbox
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

    note: 'RV Park 推荐: RV Resort at Cannon Beach (full hookup, 步行到沙滩)',
  },
  {
    id: 'seattle', title: 'Seattle',
    subtitle: 'Pike Place Market · Space Needle · Chihuly · 海鲜',
    lat: 47.6062, lng: -122.3321, type: 'hotel', icon: '🏨',
    driveFrom: '从 Cannon Beach', driveTime: '4h 30min', driveMiles: 235,
    defaultNights: 2,
    sights: ['Pike Place Market (扔鱼表演)', 'Space Needle', 'Chihuly Garden and Glass'],
  },
  {
    id: 'rainier', title: 'Mt. Rainier National Park',
    subtitle: 'Paradise 野花草甸 · 冰川近景 · Myrtle Falls 瀑布',
    lat: 46.7856, lng: -121.7353, type: 'sight', icon: '🏔️',
    driveFrom: '从 Seattle', driveTime: '2h 30min', driveMiles: 100,
    defaultNights: 1,
    sights: ['Paradise: 野花草甸 + Skyline Trail', 'Myrtle Falls 瀑布 (步行0.5mi)', 'Nisqually Glacier 冰川观景台', 'Longmire Museum 历史区'],
    note: 'Cougar Rock 营地7月全满。建议住 Ashford/Packwood 镇酒店或 RV Park。周中去 Paradise 避开人潮',
  },
  {
    id: 'return', title: '回程: I-5 南下',
    subtitle: 'Mt. Rainier → Fremont (可选 Mt. Shasta 住一晚)',
    lat: 41.3099, lng: -122.3106, type: 'sight', icon: '🏔️',
    driveFrom: '从 Mt. Rainier 回 Fremont', driveTime: '11h (直达) 或 分两天',
    driveMiles: 750,
    defaultNights: 0,
    note: '建议在 Mt. Shasta 分段过夜（距 Rainier 6h, 距 Fremont 5h）',
    passThrough: true,
  },
];

// ============================================================
// STATE
// ============================================================
let currentPlan = 'A';
let stopState = {}; // { [id]: { nights, skipped } }

function initState() {
  stopState = {};
  stopDefs.forEach(s => {
    stopState[s.id] = { nights: s.defaultNights || 0, skipped: false };
  });
}
initState();

// ============================================================
// MAP
// ============================================================
const map = L.map('map', { zoomControl: true }).setView([43.5, -123.5], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18, attribution: '&copy; OpenStreetMap'
}).addTo(map);

const typeColors = { camp: '#2e7d32', hotel: '#1565c0', sight: '#e65100' };
let mapMarkers = [];
let routeLine = null;

function updateMap() {
  mapMarkers.forEach(m => map.removeLayer(m));
  mapMarkers = [];
  if (routeLine) map.removeLayer(routeLine);

  const activeStops = stopDefs.filter(s => !stopState[s.id]?.skipped);
  const routePoints = activeStops.filter(s => s.type !== 'sight' || s.passThrough).map(s => [s.lat, s.lng]);
  // Add Fremont start
  routePoints.unshift([37.5485, -121.9886]);
  routeLine = L.polyline(routePoints, { color: '#1a73e8', weight: 3, opacity: .7, dashArray: '8,6' }).addTo(map);

  // Fremont marker
  const startIcon = L.divIcon({
    className: 'x', html: `<div style="width:32px;height:32px;border-radius:50%;background:#9c27b0;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:16px;">🏠</div>`,
    iconSize:[32,32], iconAnchor:[16,16]
  });
  mapMarkers.push(L.marker([37.5485,-121.9886],{icon:startIcon}).addTo(map).bindPopup('<b>出发: Fremont, CA</b>'));

  stopDefs.forEach((stop, i) => {
    const st = stopState[stop.id];
    if (st?.skipped) return;
    const color = typeColors[stop.type] || '#666';
    const size = stop.type === 'sight' && !stop.passThrough ? 26 : 34;
    const icon = L.divIcon({
      className: 'x',
      html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:${size>30?16:13}px;cursor:pointer;">${stop.icon}</div>`,
      iconSize:[size,size], iconAnchor:[size/2,size/2]
    });
    const marker = L.marker([stop.lat, stop.lng], { icon }).addTo(map);
    const nightsText = (st?.nights||0) > 0 ? ` · ${st.nights}晚` : '';
    marker.bindPopup(`<div style="max-width:240px;font-size:13px;line-height:1.5;"><strong style="color:${color}">${stop.icon} ${stop.title}</strong>${nightsText}<br><span style="font-size:12px;color:#555">${stop.subtitle}</span></div>`);
    marker.on('click', () => scrollToCard(stop.id));
    mapMarkers.push(marker);
  });
}

function scrollToCard(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  // Highlight briefly
  card.style.transition = 'background .3s';
  card.style.background = '#e3f2fd';
  setTimeout(() => { card.style.background = ''; }, 1500);
}

function flyToStop(id) {
  const s = stopDefs.find(x => x.id === id);
  if (!s) return;
  map.flyTo([s.lat, s.lng], 10, { duration: 1 });
  const idx = stopDefs.indexOf(s);
  const visibleIdx = stopDefs.filter((x,i) => i <= idx && !stopState[x.id]?.skipped).length;
  // +1 for Fremont marker
  if (mapMarkers[visibleIdx]) setTimeout(() => mapMarkers[visibleIdx].openPopup(), 800);
}

// ============================================================
// RENDER
// ============================================================
function getDateStr(date) {
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${m}-${d}`;
}

function formatDate(date) {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return `${date.getMonth()+1}/${date.getDate()} (${days[date.getDay()]})`;
}

function getAvailClass(n) {
  if (n === undefined || n === null) return 'avail-unknown';
  if (n >= 5) return 'avail-good';
  if (n >= 1) return 'avail-low';
  return 'avail-none';
}

function render() {
  const startDate = new Date(plans[currentPlan].startDate);
  let currentDate = new Date(startDate);
  let dayNum = 1;
  let totalNights = 0;
  let totalMiles = 0;
  let campNights = 0;
  let hotelNights = 0;

  let html = '';
  stopDefs.forEach((stop, idx) => {
    const st = stopState[stop.id];
    const isSkipped = st.skipped;

    // Calculate this stop's date
    const stopDate = new Date(currentDate);
    const dateStr = formatDate(stopDate);
    const nights = isSkipped ? 0 : (st.nights || 0);

    if (!isSkipped) {
      totalMiles += stop.driveMiles || 0;
      if (stop.type === 'camp') campNights += nights;
      else if (stop.type === 'hotel') hotelNights += nights;
      totalNights += nights;
    }

    const tagType = stop.type === 'camp' ? 'tag-camp' : stop.type === 'hotel' ? 'tag-hotel' : 'tag-sight';
    const tagLabel = stop.type === 'camp' ? 'Camping' : stop.type === 'hotel' ? 'Hotel' : '景点/途经';
    const skippedClass = isSkipped ? 'skipped' : '';

    html += `<div class="day-card ${skippedClass}" id="card-${stop.id}">`;
    html += `<div class="day-header" onclick="flyToStop('${stop.id}')">`;
    html += `<span class="day-icon">${stop.icon}</span>`;
    html += `<span class="day-title">${nights > 0 ? `Day ${dayNum}${nights>1?'-'+(dayNum+nights-1):''}` : '途经'}: ${stop.title}</span>`;
    if (!isSkipped) html += `<span class="day-date">${dateStr}</span>`;
    html += `</div>`;

    html += `<div class="day-body">`;
    html += `<span class="tag ${tagType}">${tagLabel}</span>`;

    // Drive info
    if (stop.driveFrom) {
      html += `<div class="drive-info">🚐 ${stop.driveFrom} · <strong>${stop.driveTime}</strong> · ${stop.driveMiles} mi</div>`;
    }

    html += `<div class="day-desc">${stop.subtitle}`;
    if (stop.note) html += `<br><em style="color:#c62828">${stop.note}</em>`;
    html += `</div>`;

    // Photos
    if (photos[stop.id] && photos[stop.id].length) {
      html += `<div class="photo-strip">`;
      photos[stop.id].forEach((p, pi) => {
        html += `<img class="photo-thumb" src="${p.url}" alt="${p.cap}" title="${p.cap}" onclick="openLightbox('${stop.id}',${pi})" loading="lazy">`;
      });
      html += `</div>`;
    }

    // Sights
    if (stop.sights && stop.sights.length) {
      html += `<div style="font-size:11px;color:#666;margin:4px 0;">`;
      stop.sights.forEach(s => { html += `<div>📍 ${s}</div>`; });
      html += `</div>`;
    }

    // Activities & Fishing
    const act = activities[stop.id];
    if (act) {
      const hasFishing = act.fishing && act.fishing.length;
      const hasActivities = act.activities && act.activities.length;
      const fishCount = hasFishing ? act.fishing.length : 0;
      const hasKids = act.kids && act.kids.length;
      const actCount = hasActivities ? act.activities.length : 0;
      const kidsCount = hasKids ? act.kids.length : 0;
      const totalCount = fishCount + actCount + kidsCount;
      const label = hasFishing ? `🐟 钓鱼 & 活动 (${totalCount})` : `🎯 活动 (${totalCount})`;
      html += `<div class="activity-toggle" id="act-toggle-${stop.id}" onclick="toggleActivity('${stop.id}')">`;
      html += `<span class="arrow">▶</span> ${label}`;
      html += `</div>`;
      html += `<div class="activity-panel" id="act-panel-${stop.id}">`;
      if (hasKids) {
        html += `<div class="activity-section" style="background:#fff8e1;padding:6px 8px;border-radius:6px;margin-bottom:8px;"><div class="activity-section-title" style="color:#e65100;">👧 小朋友专区</div>`;
        act.kids.forEach(k => { html += `<div class="activity-item">${k}</div>`; });
        html += `</div>`;
      }
      if (hasFishing) {
        html += `<div class="activity-section"><div class="activity-section-title">🐟 钓鱼</div>`;
        act.fishing.forEach(f => { html += `<div class="activity-item">${f}</div>`; });
        html += `</div>`;
      }
      if (hasActivities) {
        html += `<div class="activity-section"><div class="activity-section-title">🎯 活动/景点</div>`;
        act.activities.forEach(a => { html += `<div class="activity-item">${a}</div>`; });
        html += `</div>`;
      }
      html += `</div>`;
    }

    // Availability grid
    if (stop.availKey && avail[stop.availKey]) {
      html += `<div style="font-size:11px;font-weight:600;color:#444;margin:8px 0 4px;">空位 (RV适用):</div>`;
      html += `<div class="avail-grid">`;
      const data = avail[stop.availKey];
      const keys = Object.keys(data).sort();
      keys.forEach(k => {
        const v = data[k];
        const cls = getAvailClass(v);
        const parts = k.split('-');
        const label = `${parseInt(parts[0])}/${parseInt(parts[1])}`;
        // Highlight if this date falls within the stop's stay
        const cellDate = new Date(2026, parseInt(parts[0])-1, parseInt(parts[1]));
        let selected = false;
        for (let n = 0; n < nights; n++) {
          const d = new Date(stopDate);
          d.setDate(d.getDate() + n);
          if (d.getTime() === cellDate.getTime()) selected = true;
        }
        html += `<div class="avail-cell ${cls} ${selected?'selected':''}" title="${label}: ${v}位可用"><span class="avail-date">${label}</span><span class="avail-count">${v}</span></div>`;
      });
      html += `</div>`;

      // Site detail for selected dates
      const detail = siteDetail[stop.availKey];
      if (detail && nights > 0) {
        const dateStr0 = getDateStr(stopDate);
        // Show sites available on check-in date
        const sitesOnDate = detail.sites[dateStr0] || [];
        if (sitesOnDate.length > 0) {
          html += `<div class="site-detail">`;
          html += `<div class="site-detail-title">📍 ${formatDate(stopDate)} 可用营位:</div>`;
          html += `<div class="site-chips">`;
          sitesOnDate.forEach(s => {
            const t = detail.types[s] || 'S';
            const color = typeDots[t];
            const label = typeLabels[t];
            html += `<span class="site-chip" title="${label}"><span class="dot" style="background:${color}"></span>${s}</span>`;
          });
          html += `</div>`;
          html += `<div class="type-legend">`;
          // Show which types are present
          const typesPresent = [...new Set(sitesOnDate.map(s => detail.types[s] || 'S'))];
          typesPresent.forEach(t => {
            html += `<span class="type-legend-item"><span class="dot" style="background:${typeDots[t]};width:6px;height:6px;border-radius:50%;display:inline-block"></span>${typeLabels[t]}</span>`;
          });
          html += `</div>`;
          html += `</div>`;
        }

        // Multi-night continuity check
        if (nights >= 2) {
          const cont = findContinuousSites(stop.availKey, dateStr0, nights);
          if (cont) {
            if (cont.common.length > 0) {
              const rvSites = cont.common.filter(s => (detail.types[s]||'S') === 'F');
              const stdSites = cont.common.filter(s => (detail.types[s]||'S') === 'S');
              html += `<div class="multi-night-banner multi-night-ok">`;
              html += `✅ ${nights}晚连住同一营位: ${cont.common.join(', ')}`;
              if (rvSites.length) html += ` (含 ${rvSites.length} 个 Full Hookup)`;
              html += `</div>`;
            } else {
              // Check if any single date has 0
              const hasZero = cont.dates.some(dk => (avail[stop.availKey]?.[dk] ?? 0) === 0);
              if (hasZero) {
                html += `<div class="multi-night-banner multi-night-no">❌ ${nights}晚连住不可行 — 中间有日期满位</div>`;
              } else {
                html += `<div class="multi-night-banner multi-night-warn">⚠️ ${nights}晚无法连住同一营位，需中途换位</div>`;
              }
            }
          }
        }
      }

      html += `<a class="book-link" href="${bookingLinks[stop.availKey]}" target="_blank">🔗 预订</a> `;
    }

    // Alt availability (for Olympic area)
    if (stop.altAvailKeys) {
      stop.altAvailKeys.forEach(ak => {
        if (!avail[ak]) return;
        const name = ak.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
        html += `<div style="font-size:11px;font-weight:600;color:#888;margin:8px 0 2px;">${name} (替代):</div>`;
        html += `<div class="avail-grid">`;
        const data = avail[ak];
        Object.keys(data).sort().forEach(k => {
          const v = data[k];
          const cls = getAvailClass(v);
          const parts = k.split('-');
          const label = `${parseInt(parts[0])}/${parseInt(parts[1])}`;
          html += `<div class="avail-cell ${cls}" title="${label}: ${v}位"><span class="avail-date">${label}</span><span class="avail-count">${v}</span></div>`;
        });
        html += `</div>`;
        html += `<a class="book-link" href="${bookingLinks[ak]}" target="_blank" style="background:#666;">🔗 ${name}</a> `;
      });
    }

    // Cape Disappointment special
    if (stop.id === 'cape_disappointment') {
      html += `<div style="margin:8px 0;padding:8px;background:#fff8e1;border-radius:6px;font-size:11px;color:#e65100;">`;
      html += `⚠️ 施工中，仅部分营位开放。请致电 <strong>(360) 642-3078</strong> 确认`;
      html += `</div>`;
    }

    // Controls
    if (!stop.passThrough || stop.defaultNights > 0) {
      html += `<div class="controls">`;
      html += `<span style="font-size:11px;color:#666;">住宿:</span>`;
      html += `<div class="night-ctrl">`;
      html += `<button class="night-btn" onclick="adjNights('${stop.id}',-1)">−</button>`;
      html += `<span class="night-val">${nights}晚</span>`;
      html += `<button class="night-btn" onclick="adjNights('${stop.id}',1)">+</button>`;
      html += `</div>`;
      html += `<button class="skip-btn ${isSkipped?'skipped':''}" onclick="toggleSkip('${stop.id}')">${isSkipped?'已跳过 ↩':'跳过'}</button>`;
      html += `</div>`;
    }

    html += `</div>`; // day-body
    html += `</div>`; // day-card

    // Advance date
    if (!isSkipped && nights > 0) {
      dayNum += nights;
      currentDate.setDate(currentDate.getDate() + nights);
    }
  });

  document.getElementById('itinerary').innerHTML = html;

  // Summary
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-item">📅 <strong>${totalNights+1}天${totalNights}晚</strong></div>
    <div class="summary-item">🏕️ <strong>${campNights}晚</strong> camping</div>
    <div class="summary-item">🏨 <strong>${hotelNights}晚</strong> 酒店</div>
    <div class="summary-item">🚐 <strong>~${totalMiles} mi</strong></div>
    <div class="summary-item">📆 ${formatDate(startDate)} 出发</div>
  `;

  updateMap();

  // Tabs
  document.querySelectorAll('.plan-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.plan === currentPlan);
  });
}

function switchPlan(p) {
  currentPlan = p;
  initState();
  render();
}

function adjNights(id, delta) {
  const st = stopState[id];
  st.nights = Math.max(0, Math.min(5, st.nights + delta));
  if (st.nights > 0) st.skipped = false;
  render();
}

function toggleSkip(id) {
  stopState[id].skipped = !stopState[id].skipped;
  render();
}

// Legend
const legend = L.control({ position: 'bottomleft' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>图例</h4>
    <div class="legend-item"><div class="legend-dot" style="background:#2e7d32"></div> Camping</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1565c0"></div> 酒店</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e65100"></div> 景点</div>
    <div class="legend-item"><div class="legend-dot" style="background:#9c27b0"></div> 出发</div>
  `;
  return div;
};
legend.addTo(map);

// Init
render();
</script>
</body>
</html>
